// вФАвФАвФА MOTEUR CLASSEMENT вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function computeStandings(grp,scores){
  const teams=GROUPES[grp];
  const stats={};
  teams.forEach(t=>{stats[t]={pts:0,j:0,g:0,n:0,p:0,bp:0,bc:0,diff:0};});
  PG.filter(m=>m.grp===grp).forEach(m=>{
    const s=scores[m.id];if(!s)return;
    const g1=parseInt(s.g1,10),g2=parseInt(s.g2,10);
    if(isNaN(g1)||isNaN(g2))return;
    const s1=stats[m.eq1],s2=stats[m.eq2];if(!s1||!s2)return;
    s1.j++;s1.bp+=g1;s1.bc+=g2;s1.diff+=g1-g2;
    s2.j++;s2.bp+=g2;s2.bc+=g1;s2.diff+=g2-g1;
    if(g1>g2){s1.pts+=3;s1.g++;s2.p++;}
    else if(g1<g2){s2.pts+=3;s2.g++;s1.p++;}
    else{s1.pts+=1;s1.n++;s2.pts+=1;s2.n++;}
  });
  return teams.map(t=>({name:t,...stats[t]})).sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.bp-a.bp);
}

// вФАвФАвФА MOTEUR BRACKET вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function computeBracket(scores,thirds){
  const t=(i)=>(thirds[i]&&thirds[i].trim())?thirds[i].trim():null;
  const standings={};
  Object.keys(GROUPES).forEach(g=>{standings[g]=computeStandings(g,scores);});
  const top=(g,rank)=>standings[g][rank]?standings[g][rank].name:null;
  const r32={

  };
  const winner=(id,eqs)=>{
    const s=scores[id];if(!s)return null;
    const g1=parseInt(s.g1,10),g2=parseInt(s.g2,10);
    if(isNaN(g1)||isNaN(g2)||s.g1===''||s.g2==='')return null;
    if(g1===g2)return null;
    return g1>g2?eqs.eq1:eqs.eq2;
  };
  const loser=(id,eqs)=>{
    const s=scores[id];if(!s)return null;
    const g1=parseInt(s.g1,10),g2=parseInt(s.g2,10);
    if(isNaN(g1)||isNaN(g2)||s.g1===''||s.g2==='')return null;
    if(g1===g2)return null;
    return g1>g2?eqs.eq2:eqs.eq1;
  };
  const r16={
    "R16-1":{eq1:winner("R32-1",r32["R32-1"]),eq2:winner("R32-2",r32["R32-2"])},
    "R16-2":{eq1:winner("R32-3",r32["R32-3"]),eq2:winner("R32-4",r32["R32-4"])},

    "R16-4":{eq1:winner("R32-7",r32["R32-7"]),eq2:winner("R32-8",r32["R32-8"])},

    "R16-6":{eq1:winner("R32-11",r32["R32-11"]),eq2:winner("R32-12",r32["R32-12"])},
    "R16-7":{eq1:winner("R32-13",r32["R32-13"]),eq2:winner("R32-14",r32["R32-14"])},
    "R16-8":{eq1:winner("R32-15",r32["R32-15"]),eq2:winner("R32-16",r32["R32-16"])},
  };
  const qf={
    "QF-1":{eq1:winner("R16-1",r16["R16-1"]),eq2:winner("R16-2",r16["R16-2"])},
    "QF-2":{eq1:winner("R16-3",r16["R16-3"]),eq2:winner("R16-4",r16["R16-4"])},
    "QF-3":{eq1:winner("R16-5",r16["R16-5"]),eq2:winner("R16-6",r16["R16-6"])},
    "QF-4":{eq1:winner("R16-7",r16["R16-7"]),eq2:winner("R16-8",r16["R16-8"])},
  };
  const sf={
    "SF-1":{eq1:winner("QF-1",qf["QF-1"]),eq2:winner("QF-2",qf["QF-2"])},
    "SF-2":{eq1:winner("QF-3",qf["QF-3"]),eq2:winner("QF-4",qf["QF-4"])},
  };
  const p3={"3PL":{eq1:loser("SF-1",sf["SF-1"]),eq2:loser("SF-2",sf["SF-2"])}};
  const fin={"FIN":{eq1:winner("SF-1",sf["SF-1"]),eq2:winner("SF-2",sf["SF-2"])}};
  return{r32,r16,qf,sf,p3,fin};
}

    ...PG.map(m=>({id:m.id,date:m.date,heure:m.heure,tv:m.tv,label:`${m.eq1} vs ${m.eq2}`,sub:`Groupe ${m.grp} ¬Ј J${m.j}`,color:GRP_COLORS[m.grp],france:!!m.france,stade:m.stade})),
    ...Object.entries(PF_META).map(([id,m])=>{
      const eqs=allBracket[id]||{};
      const lbs=R32_LBS[id]||["√А d√©term.","√А d√©term."];
      const e1=eqs.eq1||lbs[0];
      const e2=eqs.eq2||lbs[1];
      return{id,date:m.date,heure:m.heure,tv:m.tv,label:`${e1} vs ${e2}`,sub:m.tour,color:TOUR_COLORS[m.tour]||"#4a6fa5",france:false,stade:m.stade};
    }),
  ];

  const byDate={};
  allMatches.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
  const dateOrder=[...new Set(allMatches.map(m=>m.date))];

  const activeDate=dateOrder.find(d=>byDate[d].some(m=>{const s=scores[m.id];return !s||s.g1===''||s.g2==='';})) || dateOrder[0];
  const [selectedDate,setSelectedDate]=useState(activeDate);

  const dayMatches=(byDate[selectedDate]||[]).slice().sort((a,b)=>a.heure.localeCompare(b.heure));

  return(
    <div>
      {/* Barre de dates scrollable */}
      <div style={{overflowX:"auto",paddingBottom:8,marginBottom:16}}>
        <div style={{display:"flex",gap:6,minWidth:"max-content",paddingBottom:2}}>
          {dateOrder.map(d=>{
            const ms=byDate[d];
            const done=ms.every(m=>{const s=scores[m.id];return s&&s.g1!==''&&s.g2!=='';});
            const hasFr=ms.some(m=>m.france);
            const isSel=selectedDate===d;
            return(
              <button key={d} onClick={()=>setSelectedDate(d)} style={{
                padding:"5px 9px",borderRadius:6,border:"none",cursor:"pointer",
                background:isSel?"#2c3e8c":done?"#0d1f0d":"#111827",
                color:isSel?"#fff":done?"#2ecc71":"#8a9ab0",
                fontWeight:isSel?700:400,fontSize:10,whiteSpace:"nowrap",
                outline:hasFr?"2px solid #2c3e8c44":"none",
                position:"relative",
              }}>
                {hasFr&&<span style={{position:"absolute",top:-5,right:-5,fontSize:8,background:"#2c3e8c",borderRadius:8,padding:"0 3px",color:"#7ec8ff",lineHeight:"14px"}}>рЯЗЂрЯЗЈ</span>}
                {d}{done&&!isSel&&" вЬУ"}
              </button>
            );
          })}
        </div>
      </div>

      {/* En-t√™te du jour */}
      <div style={{marginBottom:12,borderBottom:"1px solid #1e2a3a",paddingBottom:10}}>
        <div style={{fontSize:16,fontWeight:800,color:"#e8eaf0"}}>{selectedDate}</div>
        <div style={{fontSize:11,color:"#5a6070",marginTop:2}}>{dayMatches.length} match{dayMatches.length>1?"s":""} ¬Ј horaires heure fran√Іaise</div>
      </div>

      {/* Liste des matchs */}
      {dayMatches.map(m=>{
        const s=scores[m.id]||{g1:"",g2:""};
        const hasScore=s.g1!==''&&s.g2!=='';
        return(
          <div key={m.id} style={{background:"#111827",border:`1px solid ${m.color}${hasScore?"66":"22"}`,borderLeft:`4px solid ${m.color}`,borderRadius:8,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            {/* Heure + TV */}
            <div style={{minWidth:76,textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:20,fontWeight:900,color:"#ffffff",letterSpacing:1}}>{m.heure}</div>
              <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:5,flexWrap:"wrap"}}>
                {m.tv.map(ch=><span key={ch} style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:ch==="M6"?"#ff6600":"#0055ff",color:"#fff",fontWeight:700}}>{ch}</span>)}
              </div>
            </div>
            {/* Filet */}
            <div style={{width:1,alignSelf:"stretch",background:"#1e2a3a",flexShrink:0,minHeight:48}}/>
            {/* D√©tails match */}
            <div style={{flex:1,minWidth:150}}>
              <div style={{fontSize:9,color:m.color,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3,display:"flex",alignItems:"center",gap:6}}>
                {m.sub}
                {m.france&&<span style={{background:"#2c3e8c",color:"#7ec8ff",borderRadius:3,padding:"0 5px",fontSize:9,fontWeight:700}}>рЯЗЂрЯЗЈ EdF</span>}
              </div>
              <div style={{fontSize:14,fontWeight:600,color:"#e8eaf0",lineHeight:1.3}}>{m.label}</div>
              <div style={{fontSize:10,color:"#4a5568",marginTop:3}}>рЯПЯ {m.stade}</div>
            </div>
            {/* Score (lecture seule) */}
            <div style={{background:"#0d1424",borderRadius:6,padding:"8px 14px",textAlign:"center",flexShrink:0}}>
              {hasScore
                ? <span style={{fontSize:22,fontWeight:900,color:"#e8eaf0",letterSpacing:3}}>{s.g1}<span style={{color:"#3a4a5a",margin:"0 4px"}}>:</span>{s.g2}</span>
                : <span style={{fontSize:11,color:"#3a4a5a",fontStyle:"italic"}}>вАФ √† jouer вАФ</span>
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

// вФАвФАвФА APP вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function App(){
  const [scores,   setScoresRaw] = useState({});
  const [thirds,   setThirdsRaw] = useState(Array(8).fill(""));
  const [tab,      setTab]       = useState("groupes");
  const [grpFilter,setGrpFilter] = useState("TOUS");
  const [tourFilter,setTourFilter]= useState("TOUS");
  const [onlyFrance,setOnlyFrance]= useState(false);
  const [syncStatus,setSyncStatus]= useState("loading");
  const saveTimer = useRef(null);

  // Chargement initial
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch(`${BIN_URL}/latest`,{headers:{"X-Master-Key":API_KEY}});
        if(res.ok){
          const json=await res.json();
          const d=json.record||{};
          if(d.scores&&typeof d.scores==="object") setScoresRaw(d.scores);
          if(Array.isArray(d.thirds)) setThirdsRaw(d.thirds);
        }
      }catch(e){console.warn("load error",e);}
      setSyncStatus("idle");
    })();
  },[]);

  // Sauvegarde cloud avec debounce
  const saveToCloud=async(sc,th)=>{
    setSyncStatus("saving");
    try{
      const res=await fetch(BIN_URL,{method:"PUT",headers:HDRS,body:JSON.stringify({scores:sc,thirds:th})});
      if(!res.ok)throw new Error(res.status);
      setSyncStatus("saved");
      setTimeout(()=>setSyncStatus("idle"),2500);
    }catch(e){
      setSyncStatus("error");
      setTimeout(()=>setSyncStatus("idle"),4000);
    }
  };
  const debounceSave=(sc,th)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveToCloud(sc,th),1000);
  };
  const setScores=(upd)=>setScoresRaw(prev=>{
    const next=typeof upd==="function"?upd(prev):upd;
    debounceSave(next,thirds);
    return next;
  });
  const setThirds=(upd)=>setThirdsRaw(prev=>{
    const next=typeof upd==="function"?upd(prev):upd;
    debounceSave(scores,next);
    return next;
  });
  const updThird=(i,v)=>setThirds(p=>{const n=[...p];n[i]=v;return n;});

  const resetAll=()=>{
    if(!window.confirm("R√©initialiser TOUS les scores et rep√™ch√©s ? Cette action est irr√©versible."))return;
    setScoresRaw({});
    setThirdsRaw(Array(8).fill(""));
    debounceSave({},Array(8).fill(""));
  };

  const bracket=useMemo(()=>computeBracket(scores,thirds),[scores,thirds]);
  const allBracket={...bracket.r32,...bracket.r16,...bracket.qf,...bracket.sf,...bracket.p3,...bracket.fin};
  const matchesGroupes=PG.filter(m=>(!onlyFrance||m.france)&&(grpFilter==="TOUS"||m.grp===grpFilter));

  const syncCfg={
    loading:{txt:"вП≥ ChargementвА¶",c:"#4a8090"},
    idle:   {txt:"вШБпЄП Sync actif",  c:"#4a8090"},
    saving: {txt:"вђЖ SauvegardeвА¶", c:"#6bc86b"},
    saved:  {txt:"вЬУ Sauvegard√©",  c:"#2ecc71"},
    error:  {txt:"вЪ† Erreur sync", c:"#e74c3c"},
  };
  const sc=syncCfg[syncStatus]||syncCfg.idle;

  const tabSt=t=>({padding:"8px 16px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,letterSpacing:.5,textTransform:"uppercase",background:tab===t?"#2c3e8c":"#1a2035",color:tab===t?"#7ec8ff":"#6b7280"});
  const pillSt=a=>({padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:a?"#2c3e8c":"#1a2035",color:a?"#fff":"#6b7280",marginRight:4,marginBottom:4});

  const R32_LABELS={
    "R32-1":["2e Gr.A","2e Gr.B"],"R32-2":["1er Gr.C","2e Gr.F"],
    "R32-3":["1er Gr.E","Meill. 3e"],"R32-4":["1er Gr.F","2e Gr.C"],
    "R32-5":["2e Gr.E","2e Gr.I"],"R32-6":["1er Gr.I","Meill. 3e"],
    "R32-7":["1er Gr.A","Meill. 3e"],"R32-8":["1er Gr.L","Meill. 3e"],
    "R32-9":["1er Gr.G","Meill. 3e"],"R32-10":["1er Gr.D","Meill. 3e"],
    "R32-11":["1er Gr.H","2e Gr.J"],"R32-12":["2e Gr.K","2e Gr.L"],
    "R32-13":["1er Gr.B","Meill. 3e"],"R32-14":["2e Gr.D","2e Gr.G"],
    "R32-15":["1er Gr.J","2e Gr.H"],"R32-16":["1er Gr.K","Meill. 3e"],
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#e8eaf0",paddingBottom:60}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0a1628,#1a2a4a,#0d1f3c)",padding:"20px 20px 14px",borderBottom:"1px solid #1e3a5f"}}>
        <div style={{maxWidth:920,margin:"0 auto"}}>
          <div style={{fontSize:10,color:"#4a9fd5",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>FIFA World Cup</div>
          <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:4}}>
            <h1 style={{margin:0,fontSize:22,fontWeight:900,color:"#fff"}}>рЯПЖ Coupe du Monde 2026</h1>
            <span style={{fontSize:10,padding:"2px 9px",borderRadius:10,background:"#1a2035",color:sc.c,fontWeight:600}}>{sc.txt}</span>
          </div>
          <div style={{fontSize:11,color:"#6b8aaa"}}>рЯЗЇрЯЗЄ √Йtats-Unis ¬Ј рЯЗ®рЯЗ¶ Canada ¬Ј рЯЗ≤рЯЗљ Mexique ¬Ј 11 juin вАУ 19 juillet 2026</div>
          <div style={{fontSize:10,color:"#5a8080",marginTop:4}}>рЯУЇ <span style={{color:"#ff6600",fontWeight:700}}>M6</span> (54 matchs) &amp; <span style={{color:"#0055ff",fontWeight:700}}>beIN Sports</span> (104 matchs)</div>
        </div>
      </div>

      {/* TABS */}
      <div style={{background:"#0d1424",borderBottom:"1px solid #1e3a5f",padding:"10px 20px"}}>
        <div style={{maxWidth:920,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={tabSt("groupes")} onClick={()=>setTab("groupes")}>вЪљ Phase de groupes</button>
          <button style={tabSt("finale")}  onClick={()=>setTab("finale")}>вЪ° Phase finale</button>
          <button style={tabSt("tableau")} onClick={()=>setTab("tableau")}>рЯУК Groupes</button>
          <button style={tabSt("agenda")}  onClick={()=>setTab("agenda")}>рЯУЕ Agenda</button>
          <button onClick={resetAll} style={{marginLeft:"auto",padding:"6px 14px",borderRadius:6,border:"1px solid #7a1a1a",cursor:"pointer",fontWeight:700,fontSize:11,background:"#1a0808",color:"#e74c3c",letterSpacing:.5,textTransform:"uppercase"}}>рЯЧС R√©initialiser</button>
        </div>
      </div>

      <div style={{maxWidth:920,margin:"0 auto",padding:"16px 20px"}}>

        {/* вФАвФА GROUPES вФАвФА */}
        {tab==="groupes"&&(
          <>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                <button style={pillSt(grpFilter==="TOUS")} onClick={()=>setGrpFilter("TOUS")}>Tous</button>
                {Object.keys(GROUPES).map(g=><button key={g} style={{...pillSt(grpFilter===g),borderBottom:grpFilter===g?`2px solid ${GRP_COLORS[g]}`:"none"}} onClick={()=>setGrpFilter(g)}>Grp {g}</button>)}
              </div>
              <button style={{...pillSt(onlyFrance),background:onlyFrance?"#2c3e8c":"#1a2035"}} onClick={()=>setOnlyFrance(!onlyFrance)}>рЯЗЂрЯЗЈ Matchs France</button>
            </div>
            {grpFilter!=="TOUS"?(
              <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                <div style={{flex:"0 0 300px",minWidth:240}}><StandingsTable grp={grpFilter} scores={scores}/></div>
                <div style={{flex:1,minWidth:220}}>
                  <div style={{fontSize:11,color:"#5a6070",marginBottom:8}}>{matchesGroupes.length} match(s)</div>
                  {matchesGroupes.map(m=><GroupMatchCard key={m.id} m={m} scores={scores} setScores={setScores}/>)}
                </div>
              </div>
            ):(
              Object.keys(GROUPES).filter(g=>!onlyFrance||g==="I").map(g=>{
                const mg=matchesGroupes.filter(m=>m.grp===g);
                if(!mg.length)return null;
                return(
                  <div key={g} style={{marginBottom:24}}>
                    <div style={{fontSize:11,fontWeight:800,color:GRP_COLORS[g],letterSpacing:2,textTransform:"uppercase",borderBottom:`1px solid ${GRP_COLORS[g]}44`,paddingBottom:6,marginBottom:10}}>Groupe {g}</div>
                    <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
                      <div style={{flex:"0 0 280px",minWidth:240}}><StandingsTable grp={g} scores={scores}/></div>
                      <div style={{flex:1,minWidth:220}}>{mg.map(m=><GroupMatchCard key={m.id} m={m} scores={scores} setScores={setScores}/>)}</div>
                    </div>
                  </div>
                );
              })
            )}
          </>
        )}

        {/* вФАвФА PHASE FINALE вФАвФА */}
        {tab==="finale"&&(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:16}}>
              <button style={pillSt(tourFilter==="TOUS")} onClick={()=>setTourFilter("TOUS")}>Tous les tours</button>
              {TOUR_ORDER.map(t=><button key={t} style={pillSt(tourFilter===t)} onClick={()=>setTourFilter(t)}>{t}</button>)}
            </div>

            {/* Panneau rep√™ch√©s */}
            {(tourFilter==="TOUS"||tourFilter==="1/16 de finale")&&(
              <div style={{background:"#0d1424",border:"1px solid #3a7bd566",borderTop:"3px solid #3a7bd5",borderRadius:8,padding:"14px 16px",marginBottom:20}}>
                <div style={{fontSize:10,fontWeight:800,color:"#3a7bd5",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
                  рЯОЯпЄП 8 Meilleurs 3es вАФ Rep√™ch√©s <span style={{fontSize:9,background:"#3a7bd522",color:"#3a7bd5",borderRadius:3,padding:"1px 6px",fontWeight:600,textTransform:"none",letterSpacing:0,marginLeft:6}}>saisie manuelle</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
                  {[
                    {i:0,label:"3e #1",match:"вЖТ R32-3 (vs 1er Gr.E)"},
                    {i:1,label:"3e #2",match:"вЖТ R32-6 (vs 1er Gr.I)"},
                    {i:2,label:"3e #3",match:"вЖТ R32-7 (vs 1er Gr.A)"},
                    {i:3,label:"3e #4",match:"вЖТ R32-8 (vs 1er Gr.L)"},
                    {i:4,label:"3e #5",match:"вЖТ R32-9 (vs 1er Gr.G)"},
                    {i:5,label:"3e #6",match:"вЖТ R32-10 (vs 1er Gr.D)"},
                    {i:6,label:"3e #7",match:"вЖТ R32-13 (vs 1er Gr.B)"},
                    {i:7,label:"3e #8",match:"вЖТ R32-16 (vs 1er Gr.K)"},
                  ].map(({i,label,match})=>(
                    <div key={i} style={{background:"#111827",border:`1px solid ${thirds[i]?"#3a7bd566":"#1e2a3a"}`,borderRadius:6,padding:"8px 10px"}}>
                      <div style={{fontSize:9,color:"#3a7bd5",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>
                        {label} <span style={{color:"#3a4a5a",fontWeight:400,textTransform:"none",letterSpacing:0}}>{match}</span>
                      </div>
                      <input type="text" placeholder="Nom de l'√©quipeвА¶" value={thirds[i]} onChange={e=>updThird(i,e.target.value)}
                        style={{width:"100%",padding:"5px 8px",borderRadius:4,border:`1px solid ${thirds[i]?"#3a7bd5":"#2a3a4a"}`,background:"#0d1a2a",color:"#e8eaf0",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
                      {thirds[i]&&<div style={{fontSize:10,color:"#2ecc71",marginTop:4}}>вЬУ {thirds[i].trim()}</div>}
                    </div>
                  ))}
                </div>
                <button onClick={()=>setThirds(Array(8).fill(""))} style={{marginTop:10,fontSize:10,padding:"3px 10px",background:"#1a2035",border:"1px solid #3a4a5a",borderRadius:4,color:"#6b7280",cursor:"pointer"}}>R√©initialiser</button>
              </div>
            )}

            {TOUR_ORDER.filter(t=>tourFilter==="TOUS"||tourFilter===t).map(tour=>{
              const ids=TOUR_IDS[tour];
              const color=TOUR_COLORS[tour];
              return(
                <div key={tour} style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:800,letterSpacing:2,textTransform:"uppercase",color,borderBottom:`1px solid ${color}44`,paddingBottom:6,marginBottom:10}}>
                    {tour==="FINALE"?"рЯПЖ ":""}{tour}
                    {tour==="FINALE"&&<span style={{fontSize:9,marginLeft:8,color:"#888"}}>19 juillet ¬Ј MetLife Stadium ¬Ј New York</span>}
                  </div>
                  {ids.map(id=>{
                    const eqs=allBracket[id]||{};
                    const lbs=R32_LABELS[id]||["Vainq. pr√©c.","Vainq. pr√©c."];
                    return(
                      <MatchCard key={id} id={id} eq1={eqs.eq1} eq2={eqs.eq2}
                        eq1Label={lbs[0]} eq2Label={lbs[1]}
                        meta={PF_META[id]} scores={scores} setScores={setScores}
                        highlight={!!(eqs.eq1&&eqs.eq2)}/>
                    );
                  })}
                </div>
              );
            })}
          </>
        )}


        {/* вФАвФА AGENDA вФАвФА */}
        {tab==="agenda"&&<AgendaTab scores={scores} allBracket={allBracket}/>}

        {/* вФАвФА TABLEAU GROUPES вФАвФА */}
        {tab==="tableau"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
            {Object.entries(GROUPES).map(([grp,equipes])=>(
              <div key={grp} style={{background:"#111827",border:`1px solid ${GRP_COLORS[grp]}44`,borderTop:`3px solid ${GRP_COLORS[grp]}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:11,fontWeight:800,color:GRP_COLORS[grp],letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>GROUPE {grp}</div>
                {equipes.map(eq=><div key={eq} style={{fontSize:12,color:"#c8d0e0",padding:"4px 0",borderBottom:"1px solid #1e2a3a"}}>{eq}</div>)}
                <button style={{marginTop:8,fontSize:10,padding:"3px 8px",background:"#1a2035",border:`1px solid ${GRP_COLORS[grp]}44`,borderRadius:4,color:"#7ec8ff",cursor:"pointer"}} onClick={()=>{setTab("groupes");setGrpFilter(grp);}}>Voir les matchs вЖТ</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{textAlign:"center",fontSize:10,color:"#3a4a5a",marginTop:20,paddingBottom:20}}>
        Horaires heure fran√Іaise (CEST UTC+2) ¬Ј Donn√©es FIFA ¬Ј M6 &amp; beIN Sports ¬Ј Sync JSONBin
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
