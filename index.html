<script>
  // Capture toute erreur globale et l'affiche à l'écran au lieu d'une page noire silencieuse
  window.addEventListener('error', function(e){
    var box = document.getElementById('error-box');
    if(box){
      box.style.display = 'block';
      box.textContent = '⚠ Erreur JavaScript : ' + (e.message || (e.error && e.error.message) || e.error) + ' — ' + (e.filename ? (e.filename + ':' + e.lineno + ':' + e.colno) : '') + (e.error && e.error.stack ? ('\n' + e.error.stack) : '');
    }
  });
  window.addEventListener('unhandledrejection', function(e){
    var box = document.getElementById('error-box');
    if(box){
      box.style.display = 'block';
      box.textContent = '⚠ Promesse rejetée non gérée : ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + (e.reason && e.reason.stack ? ('\n' + e.reason.stack) : '');
    }
  });
</script>
